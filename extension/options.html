<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Grabbit options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; color: #24292f; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.5rem 1.25rem; }
      #status { margin-left: 0.75rem; color: #1a7f37; }
      .hint { color: #57606a; font-size: 0.85rem; margin-top: 0.25rem; }
    </style>
  </head>
  <body>
    <h1>Grabbit</h1>
    <label for="host">Server URL</label>
    <input id="host" type="url" placeholder="https://nas.example.home/grabbit" />
    <p class="hint">Where Grabbit is reachable, including any sub-path. No trailing slash needed.</p>
    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="submit-scoped key" />
    <p class="hint">Create a <code>submit</code>-scoped key in the Grabbit web UI → API keys.</p>
    <button id="save">Save</button><span id="status"></span>
    <script src="options.js"></script>
  </body>
</html>
