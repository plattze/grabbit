# Grabbit behind nginx — sub-path mount with WebSocket support.
#
# Pair with Grabbit config:
#   server:
#     root_path: "/grabbit"
#     trusted_proxies: ["<nginx container/host IP>"]

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 443 ssl;
    server_name example.home;

    # ssl_certificate     /etc/ssl/example.home.crt;
    # ssl_certificate_key /etc/ssl/example.home.key;

    location /grabbit/ {
        proxy_pass http://127.0.0.1:8080/;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (live progress at /grabbit/api/ws)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

# --- Internal-only variant (LAN restriction) --------------------------------
# Add inside the location block to limit access to your LAN:
#     allow 192.168.0.0/16;
#     allow 10.0.0.0/8;
#     deny  all;
